<div class="login-container">
  <div class="login-card">
    
    <h2>Iniciar Sesión</h2>
    <p>Bienvenido a Gestión de Gastos</p>

    <form [formGroup]="loginForm" (ngSubmit)="entrar()">
      
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="usuario@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="Ingresa tu contraseña">
      </div>

      <button type="submit" class="btn-login">Entrar</button>
    </form>

  </div>
</div>
